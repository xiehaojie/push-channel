<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Push Channel Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="login-container">
            <h2>Login</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="login-error" class="error"></p>
        </div>

        <div id="chat-container" style="display: none;">
            <div id="chat-header">
                <h2>Chat Session: <span id="session-display"></span></h2>
                <button id="logout-btn">Logout</button>
            </div>
            <div id="messages"></div>
            <form id="message-form">
                <input type="text" id="message-input" placeholder="Type a message..." required>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>
    
    <script src="sdk.js"></script>
    <script>
        const API_URL = 'http://localhost:3001/api';
        let sdk = null;

        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const loginContainer = document.getElementById('login-container');
        const chatContainer = document.getElementById('chat-container');
        const sessionDisplay = document.getElementById('session-display');
        const messagesDiv = document.getElementById('messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const logoutBtn = document.getElementById('logout-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    const sessionId = data.data.sessionId;
                    startChat(sessionId);
                } else {
                    loginError.textContent = data.message || 'Login failed';
                }
            } catch (err) {
                loginError.textContent = 'Network error';
            }
        });

        function startChat(sessionId) {
            loginContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            sessionDisplay.textContent = sessionId;

            sdk = new PushChannelSDK('ws://localhost:3001', sessionId);
            
            sdk.onMessage((msg) => {
                appendMessage('Bot', msg);
            });

            sdk.onStreamStart((from) => {
                const div = document.createElement('div');
                div.className = 'message bot stream-active';
                div.innerHTML = `<strong>${from}:</strong> <span class="content"></span>`;
                messagesDiv.appendChild(div);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            sdk.onStreamChunk((chunk) => {
                const activeStream = messagesDiv.querySelector('.stream-active .content');
                if (activeStream) {
                    activeStream.textContent += chunk;
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            });

            sdk.onStreamEnd(() => {
                const activeStream = messagesDiv.querySelector('.stream-active');
                if (activeStream) {
                    activeStream.classList.remove('stream-active');
                }
            });

            sdk.connect();
        }

        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (text && sdk) {
                appendMessage('You', text);
                sdk.sendMessage(text);
                messageInput.value = '';
            }
        });

        logoutBtn.addEventListener('click', () => {
            if (sdk) {
                sdk.disconnect();
                sdk = null;
            }
            loginContainer.style.display = 'block';
            chatContainer.style.display = 'none';
            messagesDiv.innerHTML = '';
        });

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender.toLowerCase()}`;
            div.innerHTML = `<strong>${sender}:</strong> <span>${text}</span>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
