<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Push Channel Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Auth panel -->
        <div id="auth-container">
            <h2 id="auth-title">Login</h2>
            <div class="tab-bar">
                <button id="tab-login" class="tab active" onclick="switchTab('login')">Login</button>
                <button id="tab-register" class="tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login form -->
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <!-- Register form -->
            <form id="register-form" style="display:none;">
                <input type="text" id="reg-username" placeholder="Username" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <input type="text" id="reg-name" placeholder="Display name" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <button type="submit">Register</button>
            </form>

            <p id="auth-error" class="error"></p>
        </div>

        <!-- Chat panel -->
        <div id="chat-container" style="display: none;">
            <div id="chat-header">
                <div class="header-left">
                    <h2>OpenClaw Chat</h2>
                    <span id="session-display" class="session-label"></span>
                </div>
                <div class="header-right">
                    <span id="tool-status" class="tool-status" style="display:none;">🛠️ Tools running...</span>
                    <label for="agent-id-input">Agent:</label>
                    <input type="text" id="agent-id-input" placeholder="default">
                    <button id="logout-btn">Logout</button>
                </div>
            </div>
            <div id="messages"></div>
            <form id="message-form">
                <input type="text" id="message-input" placeholder="Type a message..." required>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <script src="sdk.js"></script>
    <script>
        const API_BASE = 'http://localhost:3001';
        let sdk = null;

        const authError = document.getElementById('auth-error');
        const authContainer = document.getElementById('auth-container');
        const chatContainer = document.getElementById('chat-container');
        const sessionDisplay = document.getElementById('session-display');
        const messagesDiv = document.getElementById('messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const agentIdInput = document.getElementById('agent-id-input');
        const toolStatus = document.getElementById('tool-status');
        let isToolRunning = false;

        function updateToolStatus() {
            if (!toolStatus) return;
            toolStatus.style.display = isToolRunning ? 'inline-flex' : 'none';
        }

        function switchTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('auth-title').textContent = tab === 'login' ? 'Login' : 'Register';
            authError.textContent = '';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            authError.textContent = '';
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    startChat(data.data.sessionId);
                } else {
                    authError.textContent = data.message || 'Login failed';
                }
            } catch {
                authError.textContent = 'Network error';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            authError.textContent = '';
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            try {
                const res = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, name, email })
                });
                const data = await res.json();
                if (data.success) {
                    startChat(data.data.sessionId);
                } else {
                    authError.textContent = data.message || 'Registration failed';
                }
            } catch {
                authError.textContent = 'Network error';
            }
        });

        function startChat(sessionId) {
            authContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            sessionDisplay.textContent = sessionId.slice(0, 8) + '…';

            sdk = new PushChannelSDK(`${API_BASE}`, sessionId);

            sdk.onMessage((msg) => appendMessage('Bot', msg));

            sdk.onStreamStart((from) => {
                const div = document.createElement('div');
                div.className = 'message bot stream-active';
                div.innerHTML = `<strong>${from || 'Assistant'}:</strong> <span class="content"></span>`;
                messagesDiv.appendChild(div);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            sdk.onStreamChunk((chunk) => {
                let activeStream = messagesDiv.querySelector('.stream-active .content');
                if (!activeStream) {
                    const div = document.createElement('div');
                    div.className = 'message bot stream-active';
                    div.innerHTML = `<strong>Assistant:</strong> <span class="content"></span>`;
                    messagesDiv.appendChild(div);
                    activeStream = div.querySelector('.content');
                }
                activeStream.textContent += chunk;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            sdk.onStreamEnd(() => {
                const active = messagesDiv.querySelector('.stream-active');
                if (active) active.classList.remove('stream-active');
            });

            sdk.onToolCall((toolCallId, toolName, args) => {
                const div = document.createElement('div');
                div.className = 'message system tool-call';
                div.dataset.toolCallId = toolCallId;
                const argsStr = args && Object.keys(args).length > 0
                    ? JSON.stringify(args, null, 2)
                    : '(no args)';
                div.innerHTML = `<span>🛠️ <strong>${toolName}</strong><pre class="tool-args">${argsStr}</pre></span>`;
                messagesDiv.appendChild(div);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            sdk.onToolResult((toolCallId) => {
                const card = messagesDiv.querySelector(`.tool-call[data-tool-call-id="${CSS.escape(toolCallId)}"]`);
                if (card) {
                    card.classList.add('tool-done');
                    const strong = card.querySelector('strong');
                    if (strong) strong.insertAdjacentText('beforebegin', '✅ ');
                    const spinner = card.querySelector('.spinner');
                    if (spinner) spinner.remove();
                }
            });

            sdk.onToolStart(() => {
                isToolRunning = true;
                updateToolStatus();
                appendSystemMessage('🛠️ 工具执行中，结果会在后续推送。');
            });

            sdk.onToolEnd(() => {
                isToolRunning = false;
                updateToolStatus();
                appendSystemMessage('✅ 工具执行完成。');
            });

            sdk.onTimeoutDeferred((msg) => {
                appendSystemMessage(msg || '工具仍在执行，已忽略本次超时提示，等待后续通知。');
            });

            sdk.connect();
        }

        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            const agentId = agentIdInput.value.trim() || undefined;
            if (text && sdk) {
                appendMessage('You', text);
                sdk.sendMessage(text, agentId);
                messageInput.value = '';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            if (sdk) { sdk.disconnect(); sdk = null; }
            isToolRunning = false;
            updateToolStatus();
            chatContainer.style.display = 'none';
            authContainer.style.display = '';
            messagesDiv.innerHTML = '';
        });

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender === 'You' ? 'you' : 'bot'}`;
            div.innerHTML = `<strong>${sender}:</strong> <span>${text}</span>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function appendSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerHTML = `<span>${text}</span>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>

</html>
